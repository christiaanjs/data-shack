name = "data-shack"
main = "src/index.ts"
compatibility_date = "2025-05-06"

[[d1_databases]]
binding = "DB"
database_name = "data-shack-db"
database_id = "b5f7796d-323f-49d0-aca1-e39a64bdb55b"

[[r2_buckets]]
binding = "R2"
bucket_name = "data-shack-storage"

[[durable_objects.bindings]]
name = "CATALOG"
class_name = "CatalogDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CatalogDO"]

[[queues.producers]]
binding = "LOAD_JOB_QUEUE"
queue   = "data-shack-load-jobs"

[[queues.consumers]]
queue             = "data-shack-load-jobs"
max_batch_size    = 10
max_batch_timeout = 1
max_retries       = 3

[triggers]
crons = ["* * * * *"]

[vars]
ENABLE_OAUTH = "true"
ALLOWED_ORIGIN = "https://data-shack.pages.dev"
DEFAULT_OAUTH_PROVIDER = "google"

# Secrets (never put values here — set via: wrangler secret put <NAME>)
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# JWT_SECRET
# DEV_TOKEN
# DEV_USER_ID

# ── Staging environment ───────────────────────────────────────────────────
[env.staging]
name = "data-shack-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "data-shack-db-staging"
database_id = "1910faa5-f94e-4e15-aedd-648e604a6915"

[[env.staging.r2_buckets]]
binding = "R2"
bucket_name = "data-shack-storage-staging"

[[env.staging.durable_objects.bindings]]
name = "CATALOG"
class_name = "CatalogDO"

[[env.staging.queues.producers]]
binding = "LOAD_JOB_QUEUE"
queue   = "data-shack-load-jobs-staging"

[[env.staging.queues.consumers]]
queue          = "data-shack-load-jobs-staging"
max_batch_size = 10
max_retries    = 3

[env.staging.triggers]
crons = ["* * * * *"]

[env.staging.vars]
ENABLE_OAUTH = "true"
ALLOWED_ORIGIN = "https://data-shack-staging.pages.dev"
ALLOW_ORIGIN_SUBDOMAINS = "true"
DEFAULT_OAUTH_PROVIDER = "google"

# Secrets for staging (set via: wrangler secret put <NAME> --env staging)
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# JWT_SECRET
# DEV_TOKEN
# DEV_USER_ID
