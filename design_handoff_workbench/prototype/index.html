<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Shack — Workbench</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <link rel="stylesheet" href="ds-components.css" />
  <link rel="stylesheet" href="workbench.css" />

  <!-- CodeMirror 6 via esm.sh. The import map pins one copy of each core
       package and ?external makes every package resolve its deps through the
       map, so there is a single @codemirror/state instance (no "multiple
       instances" breakage). -->
  <script type="importmap">
  {
    "imports": {
      "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2",
      "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5?external=@codemirror/state",
      "@codemirror/language": "https://esm.sh/@codemirror/language@6.10.8?external=@codemirror/state,@codemirror/view,@lezer/common,@lezer/highlight,@lezer/lr",
      "@codemirror/commands": "https://esm.sh/@codemirror/commands@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language",
      "@codemirror/autocomplete": "https://esm.sh/@codemirror/autocomplete@6.18.6?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/commands",
      "@codemirror/search": "https://esm.sh/@codemirror/search@6.5.8?external=@codemirror/state,@codemirror/view",
      "@codemirror/lang-sql": "https://esm.sh/@codemirror/lang-sql@6.8.0?external=@codemirror/state,@codemirror/view,@codemirror/language,@codemirror/autocomplete",
      "@lezer/common": "https://esm.sh/@lezer/common@1.2.3",
      "@lezer/highlight": "https://esm.sh/@lezer/highlight@1.2.1?external=@lezer/common",
      "@lezer/lr": "https://esm.sh/@lezer/lr@1.4.2?external=@lezer/common"
    }
  }
  </script>
  <script type="module" src="cm-setup.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="lib.jsx"></script>
  <script type="text/babel" src="Explorer.jsx"></script>
  <script type="text/babel" src="views.jsx"></script>
  <script type="text/babel" src="Console.jsx"></script>
  <script type="text/babel" src="CommandPalette.jsx"></script>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
