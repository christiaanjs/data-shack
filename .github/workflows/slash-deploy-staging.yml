name: Slash command — deploy-staging

on:
  issue_comment:
    types: [created]

jobs:
  deploy-staging:
    # Only run on PR comments (not issue comments) from the repo owner
    if: >-
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/deploy-staging') &&
      github.event.comment.author_association == 'OWNER'
    runs-on: ubuntu-latest
    permissions:
      actions: write       # trigger workflow_dispatch
      pull-requests: write # react to the comment
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: pr.head.ref,
              inputs: { environment: 'staging' },
            });

            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
